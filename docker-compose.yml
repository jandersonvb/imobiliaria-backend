services:
  postgres:
    image: postgres:16-alpine
    container_name: imobiliaria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: imobiliaria
    ports:
      - '5433:5432'
    volumes:
      - imobiliaria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d imobiliaria']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  imobiliaria_pgdata:
